<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Love 💖</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🎵 CINEMATIC MUSIC -->
<audio id="bgMusic" loop>
    <source src="7th-mata-sa-mata-official-audio_65jjXSDp.mp3" type="audio/mpeg">
</audio>

<!-- 🌌 NEON SKY -->
<div class="bg" id="bg"></div>

<!-- ================= LOGIN ================= -->
<div class="screen active" id="loginScreen">

    <h1 class="glow">Neon Love Access 💖</h1>

    <input id="girlfriendName" placeholder="Enter your name...">

    <div class="btns">
        <button id="loginBtn">Enter 💕</button>
        <button id="cancelBtn">Cancel 😼</button>
    </div>

</div>

<!-- ================= MESSAGE ================= -->
<div class="screen" id="messageScreen">

    <h1 id="greet"></h1>

    <input id="nameInput" readonly>

    <button id="proceedBtn">Open Letter 💌</button>
</div>

<!-- ================= ENVELOPE LETTER ================= -->
<div class="screen" id="letterScreen">

    <div class="letter">

        <h2>💌 A Cinematic Letter</h2>

        <p>
            Di ko man kaya maibagay lahat,<br><br>
            tulad ng naiibigay ng mga nasa malapit<br><br>
            Sana magustohan mo to ang munting regalo ko 💖
        </p>

        <h1 class="question">
            Pwede Ba kitang ligawan?💕
        </h1>

        <div class="choice-btn">
          <button id="yesBtn">Yes 😍</button>
          <button id="noBtn">No 😿</button>
        </div>

    </div>

</div>

<!-- ================= POPUP ================= -->
<div class="popup" id="catPopup">

    <div class="popup-content">

        <span class="closePopup">×</span>

        <img src="c078082c4423cda6216a7b4627c6eb52.jpg" class="cat">

        <h2>No, you can't cancel 😾💖</h2>

        <button id="continueBtn">Okay 😳</button>
        
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
